# ---------------------------------------------------------
# Azure DevOps Pipeline: Publish npm Packages via ESRP Release
#
# GitHub Actions / Trusted Publishers are NOT compliant for
# publishing Microsoft packages to npm. This ADO pipeline
# is the only approved path for production publishing.
#
# Prerequisites:
#   1. Complete ESRP Release onboarding (https://aka.ms/esrp-onboarding)
#   2. Configure Azure Identity (Managed Identity recommended)
#   3. Set up TSS signing certificate in Azure Key Vault
#   4. Install ESRP Release ADO Task extension
#   5. Disable 2FA for package publishing (not account 2FA)
#   6. Packages must be under @microsoft scope
#
# See: PUBLISHING.md for full setup guide.
# ---------------------------------------------------------

trigger: none  # Manual or release-gated trigger only

pr: none

parameters:
  - name: packages
    type: object
    displayName: 'Packages to publish'
    default:
      - name: agentmesh-copilot-governance
        path: packages/agentmesh-integrations/copilot-governance
      - name: agentmesh-mastra
        path: packages/agentmesh-integrations/mastra-agentmesh
      - name: agentmesh-api
        path: packages/agent-mesh/services/api
      - name: agentmesh-mcp-proxy
        path: packages/agent-mesh/packages/mcp-proxy
      - name: agentmesh-sdk
        path: packages/agent-mesh/sdks/typescript
      - name: agent-os-copilot-extension
        path: packages/agent-os/extensions/copilot
      - name: agentos-mcp-server
        path: packages/agent-os/extensions/mcp-server

  - name: nodeVersion
    type: string
    displayName: 'Node.js version'
    default: '20'

  - name: dryRun
    type: boolean
    displayName: 'Dry run (build + pack only, skip ESRP publish)'
    default: false

# -------------------------------------------------------
# ESRP Configuration
# TODO: Update Key Vault name and cert names once PRSS certs are generated (week of March 24)
# -------------------------------------------------------
variables:
  esrpServiceConnection: 'agt-esrp-release'
  esrpKeyVaultName: 'agt-esrp-kv'  # TODO: replace with actual KV name
  esrpSignCertName: 'esrp-sign'  # TODO: replace with actual cert name
  esrpClientId: 'a458522c-0359-4e92-9887-5fee1607c0c7'
  esrpDomainTenantId: '975f013f-7f24-47e8-a7d3-abc4752bf346'
  esrpOwners: 'agt@microsoft.com'
  esrpApprovers: 'agt@microsoft.com'

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Build
    displayName: 'Build & Pack npm Packages'
    jobs:
      - ${{ each pkg in parameters.packages }}:
        - job: Build_${{ replace(pkg.name, '-', '_') }}
          displayName: 'Build ${{ pkg.name }}'
          steps:
            - checkout: self

            - task: UseNode@1
              inputs:
                version: '${{ parameters.nodeVersion }}'
              displayName: 'Use Node.js ${{ parameters.nodeVersion }}'

            - script: |
                npm ci --ignore-scripts 2>/dev/null || npm install
              workingDirectory: '${{ pkg.path }}'
              displayName: 'Install dependencies'

            - script: |
                npm run build
              workingDirectory: '${{ pkg.path }}'
              displayName: 'Build ${{ pkg.name }}'

            - script: |
                mkdir -p $(Pipeline.Workspace)/npm-packages/${{ pkg.name }}
                npm pack --pack-destination $(Pipeline.Workspace)/npm-packages/${{ pkg.name }}
              workingDirectory: '${{ pkg.path }}'
              displayName: 'Pack ${{ pkg.name }}'

            - script: |
                echo "=== Packed artifacts for ${{ pkg.name }} ==="
                ls -la $(Pipeline.Workspace)/npm-packages/${{ pkg.name }}/
                # Verify .tgz exists
                if ! ls $(Pipeline.Workspace)/npm-packages/${{ pkg.name }}/*.tgz 1>/dev/null 2>&1; then
                  echo "##[error]No .tgz found for ${{ pkg.name }}"
                  exit 1
                fi
                # Verify not marked as private
                PRIVATE=$(node -e "console.log(require('./package.json').private || false)")
                if [ "$PRIVATE" = "true" ]; then
                  echo "##[error]${{ pkg.name }} is marked private — cannot publish"
                  exit 1
                fi
              workingDirectory: '${{ pkg.path }}'
              displayName: 'Validate ${{ pkg.name }} package'

            - task: PublishPipelineArtifact@1
              inputs:
                targetPath: '$(Pipeline.Workspace)/npm-packages/${{ pkg.name }}'
                artifact: 'npm-${{ pkg.name }}'
                publishLocation: 'pipeline'
              displayName: 'Publish ${{ pkg.name }} build artifact'

  - stage: Publish
    displayName: 'Publish to npm via ESRP'
    dependsOn: Build
    condition: and(succeeded(), eq('${{ parameters.dryRun }}', false))
    jobs:
      - job: Publish_npm
        displayName: 'Publish all packages to npm'
        steps:
          # Download all package artifacts into a single folder
          - ${{ each pkg in parameters.packages }}:
            - task: DownloadPipelineArtifact@2
              inputs:
                artifact: 'npm-${{ pkg.name }}'
                targetPath: '$(Pipeline.Workspace)/npm-publish'
              displayName: 'Download ${{ pkg.name }}'

          - script: |
              echo "=== All packages to publish ==="
              find $(Pipeline.Workspace)/npm-publish -name "*.tgz" -type f
              echo ""
              TOTAL=$(find $(Pipeline.Workspace)/npm-publish -name "*.tgz" -type f | wc -l)
              echo "Total packages: $TOTAL"
            displayName: 'List all .tgz packages'

          # ---------------------------------------------------------
          # ESRP Release Task — Publishes to npm
          #
          # ESRP accepts a folder with one or more .tgz files.
          # Package names/scopes are inferred from the tarballs.
          # Nested folders are supported.
          #
          # Note: npm code signing is not required by Microsoft.
          # ---------------------------------------------------------
          - task: EsrpRelease@11
            displayName: 'ESRP Publish to npm'
            inputs:
              connectedservicename: '$(esrpServiceConnection)'
              usemanagedidentity: true
              keyvaultname: '$(esrpKeyVaultName)'
              signcertname: '$(esrpSignCertName)'
              clientid: '$(esrpClientId)'
              intent: 'PackageDistribution'
              contenttype: 'npm'
              contentsource: 'Folder'
              folderlocation: '$(Pipeline.Workspace)/npm-publish'
              waitforreleasecompletion: true
              owners: '$(esrpOwners)'
              approvers: '$(esrpApprovers)'
              serviceendpointurl: 'https://api.esrp.microsoft.com'
              mainpublisher: 'ESRPRELPACMAN'
              domaintenantid: '$(esrpDomainTenantId)'

  - stage: Verify
    displayName: 'Verify Published Packages'
    dependsOn: Publish
    condition: succeeded()
    jobs:
      - job: VerifyPackages
        displayName: 'Verify packages on npm'
        steps:
          - task: UseNode@1
            inputs:
              version: '${{ parameters.nodeVersion }}'
            displayName: 'Use Node.js ${{ parameters.nodeVersion }}'

          - script: |
              echo "=== Verifying packages on npm registry ==="
              sleep 15
              ${{ each pkg in parameters.packages }}:
              PKG_NAME=$(node -e "console.log(require('./${{ pkg.path }}/package.json').name)")
              PKG_VER=$(node -e "console.log(require('./${{ pkg.path }}/package.json').version)")
              echo -n "Checking $PKG_NAME@$PKG_VER... "
              npm view "$PKG_NAME@$PKG_VER" version 2>/dev/null && echo "✅" || echo "⚠️  not yet indexed"
            displayName: 'Verify npm availability'
