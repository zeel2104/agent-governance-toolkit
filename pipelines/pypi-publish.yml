# ---------------------------------------------------------
# Azure DevOps Pipeline: Publish Python Packages to PyPI
# via ESRP Release (Microsoft's approved OSS publishing path)
#
# GitHub Actions / Trusted Publishers are NOT compliant for
# publishing Microsoft packages to PyPI. This ADO pipeline
# is the only approved path for production publishing.
#
# Prerequisites:
#   1. Complete ESRP Release onboarding (https://aka.ms/esrp-onboarding)
#   2. Configure Azure Identity (Managed Identity recommended)
#   3. Set up TSS signing certificate in Azure Key Vault
#   4. Install ESRP Release ADO Task extension
#   5. Transfer PyPI package ownership to 'microsoft' account
#
# See: docs/internal/pypi-publishing.md for full setup guide.
# ---------------------------------------------------------

trigger: none  # Manual or release-gated trigger only

pr: none

parameters:
  - name: packages
    type: object
    displayName: 'Packages to publish'
    default:
      - name: agent-os
        path: packages/agent-os
      - name: agent-mesh
        path: packages/agent-mesh
      - name: agent-hypervisor
        path: packages/agent-hypervisor
      - name: agent-sre
        path: packages/agent-sre
      - name: agent-compliance
        path: packages/agent-compliance
      - name: agent-runtime
        path: packages/agent-runtime
      - name: agent-lightning
        path: packages/agent-lightning

  - name: pythonVersion
    type: string
    displayName: 'Python version'
    default: '3.11'

  - name: dryRun
    type: boolean
    displayName: 'Dry run (build only, skip ESRP publish)'
    default: false

# -------------------------------------------------------
# ESRP Configuration
# TODO: Update Key Vault name and cert names once PRSS certs are generated (week of March 24)
# -------------------------------------------------------
variables:
  # Azure service connection for ESRP Release
  esrpServiceConnection: 'agt-esrp-release'
  # Azure Key Vault containing PRSS auth + sign certificates
  esrpKeyVaultName: 'agt-esrp-kv'  # TODO: replace with actual KV name
  # Code-signing certificate name in Key Vault
  esrpSignCertName: 'esrp-sign'  # TODO: replace with actual cert name
  # AAD App Registration client ID (AME tenant)
  esrpClientId: 'a458522c-0359-4e92-9887-5fee1607c0c7'
  # ESRP domain tenant ID (Microsoft standard)
  esrpDomainTenantId: '975f013f-7f24-47e8-a7d3-abc4752bf346'
  # Package owners and approvers (must be Microsoft FTEs)
  esrpOwners: 'agt@microsoft.com'
  esrpApprovers: 'agt@microsoft.com'

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Build
    displayName: 'Build Python Packages'
    jobs:
      - ${{ each pkg in parameters.packages }}:
        - job: Build_${{ replace(pkg.name, '-', '_') }}
          displayName: 'Build ${{ pkg.name }}'
          steps:
            - checkout: self

            - task: UsePythonVersion@0
              inputs:
                versionSpec: '${{ parameters.pythonVersion }}'
              displayName: 'Use Python ${{ parameters.pythonVersion }}'

            - script: |
                python -m pip install --upgrade pip
                pip install --no-cache-dir build==1.2.1 setuptools
              displayName: 'Install build tools'

            - script: |
                python -m build
              workingDirectory: '${{ pkg.path }}'
              displayName: 'Build ${{ pkg.name }} (sdist + wheel)'

            - script: |
                echo "=== Built artifacts for ${{ pkg.name }} ==="
                ls -la dist/
                echo ""
                echo "=== Validating artifacts ==="
                for f in dist/*.whl; do
                  echo "✅ Wheel: $f"
                done
                for f in dist/*.tar.gz; do
                  echo "✅ Sdist: $f"
                done
                # Verify at least one wheel exists (required by Microsoft Python team policy)
                if ! ls dist/*.whl 1>/dev/null 2>&1; then
                  echo "❌ ERROR: No wheel (.whl) found — at least one wheel is required"
                  exit 1
                fi
              workingDirectory: '${{ pkg.path }}'
              displayName: 'Validate build artifacts'

            - task: PublishPipelineArtifact@1
              inputs:
                targetPath: '${{ pkg.path }}/dist'
                artifact: 'pypi-${{ pkg.name }}'
                publishLocation: 'pipeline'
              displayName: 'Publish ${{ pkg.name }} build artifacts'

  - stage: Publish
    displayName: 'Publish to PyPI via ESRP'
    dependsOn: Build
    condition: and(succeeded(), eq('${{ parameters.dryRun }}', false))
    jobs:
      - ${{ each pkg in parameters.packages }}:
        - job: Publish_${{ replace(pkg.name, '-', '_') }}
          displayName: 'Publish ${{ pkg.name }} to PyPI'
          steps:
            - task: DownloadPipelineArtifact@2
              inputs:
                artifact: 'pypi-${{ pkg.name }}'
                targetPath: '$(Pipeline.Workspace)/dist-${{ pkg.name }}'
              displayName: 'Download ${{ pkg.name }} artifacts'

            - script: |
                echo "=== Artifacts to publish for ${{ pkg.name }} ==="
                ls -la $(Pipeline.Workspace)/dist-${{ pkg.name }}/
              displayName: 'List artifacts for ${{ pkg.name }}'

            # ---------------------------------------------------------
            # ESRP Release Task — Publishes to PyPI
            #
            # Package name is inferred from artifact filenames.
            # ESRP does not sign Python wheels; compliance value
            # comes from controlled credentials, malware scanning,
            # and centralized ownership.
            # ---------------------------------------------------------
            - task: EsrpRelease@11
              displayName: 'ESRP Publish ${{ pkg.name }} to PyPI'
              inputs:
                connectedservicename: '$(esrpServiceConnection)'
                usemanagedidentity: true
                keyvaultname: '$(esrpKeyVaultName)'
                signcertname: '$(esrpSignCertName)'
                clientid: '$(esrpClientId)'
                intent: 'PackageDistribution'
                contenttype: 'PyPi'
                contentsource: 'Folder'
                folderlocation: '$(Pipeline.Workspace)/dist-${{ pkg.name }}'
                waitforreleasecompletion: true
                owners: '$(esrpOwners)'
                approvers: '$(esrpApprovers)'
                serviceendpointurl: 'https://api.esrp.microsoft.com'
                mainpublisher: 'ESRPRELPACMAN'
                domaintenantid: '$(esrpDomainTenantId)'

  - stage: Verify
    displayName: 'Verify Published Packages'
    dependsOn: Publish
    condition: succeeded()
    jobs:
      - job: VerifyPackages
        displayName: 'Verify packages on PyPI'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '${{ parameters.pythonVersion }}'
            displayName: 'Use Python ${{ parameters.pythonVersion }}'

          - script: |
              echo "=== Verifying packages are available on PyPI ==="
              sleep 30  # Allow PyPI index to update
              ${{ each pkg in parameters.packages }}:
              echo "Checking ${{ pkg.name }}..."
              pip install --dry-run --no-deps ${{ pkg.name }} 2>&1 | head -5 || echo "⚠️  ${{ pkg.name }} not yet indexed (may take a few minutes)"
            displayName: 'Verify PyPI availability'
