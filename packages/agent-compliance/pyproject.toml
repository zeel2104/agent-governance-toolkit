[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-agent-compliance"
version = "1.0.1"
description = "Unified installer and compliance documentation for the Agent Governance Toolkit"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
authors = [
    {name = "Imran Siddique", email = "imran@imransiddique.com"}
]
keywords = [
    "ai-agents", "governance", "multi-agent", "trust", "security",
    "compliance", "audit", "policy-enforcement", "agent-os", "agentmesh",
    "hypervisor", "sre", "llm", "autonomous-agents", "enterprise-ai"
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "agent-os-kernel>=1.0.0",
    "agentmesh-platform>=1.0.0",
]

[project.optional-dependencies]
hypervisor = ["agent-hypervisor>=2.0.0"]
sre = ["agent-sre>=1.0.0"]
full = [
    "agent-hypervisor>=2.0.0",
    "agent-sre>=1.0.0",
]

[project.urls]
Homepage = "https://imransiddique.com"
Documentation = "https://imransiddique.com/agent-os-docs/"
Repository = "https://github.com/microsoft/agent-governance-toolkit"
"Bug Tracker" = "https://github.com/microsoft/agent-governance-toolkit/issues"
"Agent OS" = "https://github.com/microsoft/agent-governance-toolkit"
"AgentMesh" = "https://github.com/microsoft/agent-governance-toolkit"
"Agent Hypervisor" = "https://github.com/microsoft/agent-governance-toolkit"
"Agent SRE" = "https://github.com/microsoft/agent-governance-toolkit"
